<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Admin Uang Kas</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    input, select, button { margin: 5px 0; padding: 5px; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
    th { background-color: #f2f2f2; }
    .total { margin-top: 15px; font-weight: bold; }
  </style>
</head>
<body>
  <h2>Admin Uang Kas</h2>

  <label>Keterangan:</label><br>
  <input type="text" id="keterangan"><br>

  <label>Jumlah:</label><br>
  <input type="number" id="jumlah"><br>

  <label>Jenis Transaksi:</label><br>
  <select id="jenis">
    <option value="masuk">Masuk</option>
    <option value="keluar">Keluar</option>
  </select><br>

  <button onclick="simpan()">Simpan</button>

  <table id="tabelTransaksi">
    <thead>
      <tr>
        <th>Tanggal</th>
        <th>Keterangan</th>
        <th>Jumlah</th>
        <th>Jenis</th>
        <th>Total Kas</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <div class="total" id="totalKas">Total Kas: Rp 0</div>

  <script>
    const url = "‎https://script.google.com/macros/s/AKfycbzNUjXF6p5j6axX-4vK7I82I_ZEYeSlKarlhvzXcqqoRQdlC039LsrxZxTaOAfr5X4l/exec"; // ganti dengan URL Web App Anda

    function simpan() {
      const ket = document.getElementById("keterangan").value;
      const jml = document.getElementById("jumlah").value;
      const jenis = document.getElementById("jenis").value;

      if (!ket || !jml) {
        alert("Isi keterangan dan jumlah dengan benar!");
        return;
      }

      const formData = new FormData();
      formData.append("keterangan", ket);
      formData.append("jumlah", jml);
      formData.append("jenis", jenis);

      fetch(url, { method: "POST", body: formData })
        .then(res => res.text())
        .then(txt => {
          alert(txt); // pesan sukses
          loadData(); // refresh tabel
          // reset form
          document.getElementById("keterangan").value = "";
          document.getElementById("jumlah").value = "";
          document.getElementById("jenis").value = "masuk";
        });
    }

    function loadData() {
      fetch(url)
        .then(res => res.json())
        .then(data => {
          const tbody = document.querySelector("#tabelTransaksi tbody");
          tbody.innerHTML = "";
          let totalKas = 0;
          for (let i = 1; i < data.length; i++) {
            const row = document.createElement("tr");
            row.innerHTML = `
              <td>${new Date(data[i][0]).toLocaleDateString("id-ID")}</td>
              <td>${data[i][1]}</td>
              <td>Rp ${parseFloat(data[i][2]).toLocaleString("id-ID")}</td>
              <td>${data[i][3]}</td>
              <td>Rp ${parseFloat(data[i][4]).toLocaleString("id-ID")}</td>
            `;
            tbody.appendChild(row);
            totalKas = data[i][4];
          }
          document.getElementById("totalKas").innerText = "Total Kas: Rp " + totalKas.toLocaleString("id-ID");
        });
    }

    window.onload = loadData;
  </script>
</body>
</html>
