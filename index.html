<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Admin Uang Kas</title>
</head>
<body>
  <h2>Admin Uang Kas</h2>
  <form id="kasForm">
    <label>Keterangan:</label><br>
    <input type="text" name="keterangan"><br>
    <label>Jumlah:</label><br>
    <input type="number" name="jumlah"><br>
    <label>Jenis:</label><br>
    <select name="jenis">
      <option value="masuk">Masuk</option>
      <option value="keluar">Keluar</option>
    </select><br><br>
    <button type="submit">Simpan</button>
  </form>

  <h3></h3>
  <div id="hasil"></div>

  <script>
const url = "https://script.google.com/macros/s/AKfycbzPfFTPz-77qfCL44cx4wHG930_VtU60OmutoUv1OWcZROBOlL5urbwXUwy-acdvT35/exec";

// load data dari Google Sheets
function loadData() {
  fetch(url)
    .then(res => res.json())
    .then(data => {
      let html = "<table border='1'><tr><th>Tanggal</th><th>Keterangan</th><th>Jumlah</th><th>Jenis</th><th>Total Kas</th></tr>";
      for (let i = 1; i < data.length; i++) {
        html += "<tr>";
        html += "<td>" + new Date(data[i][0]).toLocaleDateString("id-ID") + "</td>";
        html += "<td>" + data[i][1] + "</td>";
        html += "<td>Rp " + data[i][2].toLocaleString("id-ID") + "</td>";
        html += "<td>" + data[i][3] + "</td>";
        html += "<td>Rp " + data[i][4].toLocaleString("id-ID") + "</td>";
        html += "</tr>";
      }
      html += "</table>";
      document.getElementById("hasil").innerHTML = html;
    });
}

// submit form → simpan data
document.getElementById("kasForm").addEventListener("submit", function(e){
  e.preventDefault();
  var formData = new FormData(this);
  fetch(url, { method: "POST", body: formData })
    .then(res => res.text())
    .then(txt => {
      alert(txt);
      loadData(); // refresh tabel setelah simpan
    });
});

// load data saat halaman pertama kali dibuka
window.onload = loadData;
  </script>
</body>
</html>
